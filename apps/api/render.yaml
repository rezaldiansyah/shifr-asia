# ===========================================
# Shifr Asia API - Render Configuration
# ===========================================
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: shifr-api
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://shifr-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: shifr-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: shifr-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: shifr-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: shifr-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: shifr-db
          property: password
      - key: APP_KEY
        generateValue: true
      - key: MAYAR_API_KEY
        sync: false
      - key: MAYAR_SANDBOX
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://shifr.asia,https://www.shifr.asia
      - key: FRONTEND_URL
        value: https://shifr.asia

databases:
  - name: shifr-db
    databaseName: shifr_asia
    user: shifr
    plan: free
    region: singapore
