# ===========================================
# Shifr Asia - Local Development Stack
# ===========================================
# Usage: docker-compose up -d
#
# For PRODUCTION, use FREE-tier services:
# - Backend: Render (render.yaml)
# - Database: Supabase (free PostgreSQL)
# - Frontend: Vercel
# See docs/INFRASTRUCTURE.md for setup guide
#
# ===========================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shifr_postgres
    environment:
      POSTGRES_DB: shifr_asia
      POSTGRES_USER: shifr
      POSTGRES_PASSWORD: shifr_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shifr -d shifr_asia" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shifr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: shifr_api
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:your-app-key-here}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: shifr_asia
      DB_USERNAME: shifr
      DB_PASSWORD: shifr_secret
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # MailHog (Local email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: shifr_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  postgres_data:
  redis_data:


networks:
  default:
    name: shifr_network
